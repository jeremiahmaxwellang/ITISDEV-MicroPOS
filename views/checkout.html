<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - MicroPOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/checkout.css">
  <script defer src="/js/checkout.js"></script>
</head>

<body>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-icon active" title="Dashboard">
      <img class="nav-icon-img" src="/images/Icon.png" alt="" aria-hidden="true">
    </div>
    <div class="nav-icon" title="Cart">
      <img class="nav-icon-img" src="/images/Icon2.png" alt="" aria-hidden="true">
    </div>
    <a class="nav-icon" title="Products" href="/products" aria-label="Products">
      <img class="nav-icon-img" src="/images/Icon3.png" alt="" aria-hidden="true">
    </a>
    <a class="nav-icon" title="Reports" href="/reports" aria-label="Reports">
      <img class="nav-icon-img" src="/images/Icon4.png" alt="" aria-hidden="true">
    </a>
    <div class="nav-icon" title="Analytics">
      <img class="nav-icon-img" src="/images/Icon5.png" alt="" aria-hidden="true">
    </div>
    <div class="nav-icon" title="Settings">
      <img class="nav-icon-img" src="/images/Icon6.png" alt="" aria-hidden="true">
    </div>

    <div class="sidebar-bottom">
      <div class="nav-icon logout" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </div>
    </div>
  </nav>

  <main class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <div>
        <h1>Checkout</h1>
        <p>Complete your purchase</p>
      </div>
      <div class="profile">
        <div class="profile-info">
          <strong>Juan Dela Cruz</strong>
          <span>Store Owner</span>
        </div>
        <div class="profile-avatar" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>
    </header>

    <!-- CHECKOUT CONTAINER -->
    <div class="checkout-container">
      <button class="back-button" onclick="window.history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to POS
      </button>

      <div class="checkout-layout">
        <!-- LEFT: ORDER SUMMARY -->
        <section class="order-section">
          <h2>Order Summary</h2>
          
          <div class="order-items">
            <div id="orderItemsList"></div>
          </div>

          <div class="order-totals">
            <div class="total-row">
              <span>Subtotal</span>
              <span class="amount" id="subtotalAmount">₱0.00</span>
            </div>
            <div class="total-row">
              <span>Tax</span>
              <span class="amount" id="taxAmount">₱0.00</span>
            </div>
            <div class="total-row final">
              <span>Total</span>
              <span class="amount" id="totalAmount">₱0.00</span>
            </div>
          </div>
        </section>

        <!-- RIGHT: PAYMENT METHOD -->
        <section class="payment-section">
          <h2>Payment Method</h2>

          <div class="payment-methods">
            <!-- CASH -->
            <div class="payment-card" id="cashCard">
              <div class="payment-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                  <line x1="1" y1="10" x2="23" y2="10"></line>
                </svg>
              </div>
              <p class="payment-name">Cash</p>
              <input type="radio" name="payment_method" value="Cash" checked class="payment-radio" id="cashRadio">
            </div>

            <!-- GCASH -->
            <div class="payment-card" id="gcashCard">
              <div class="payment-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                  <line x1="1" y1="10" x2="23" y2="10"></line>
                  <path d="M5 14v3"></path>
                  <path d="M19 14v3"></path>
                </svg>
              </div>
              <p class="payment-name">GCash</p>
              <input type="radio" name="payment_method" value="GCash" class="payment-radio" id="gcashRadio">
            </div>
          </div>

          <!-- PAYMENT INPUT SECTION -->
          <div id="paymentInputSection" class="payment-input-section">
            <!-- CASH INPUT -->
            <div id="cashInputBox" class="input-box">
              <label for="amountPaid">Amount Paid</label>
              <div class="input-with-currency">
                <span>₱</span>
                <input type="number" id="amountPaid" placeholder="0.00" step="0.01" min="0">
              </div>
              <p id="changeDisplay" class="change-display"></p>
            </div>

            <!-- GCASH INPUT -->
            <div id="gcashInputBox" class="input-box" style="display: none;">
              <label for="gcashQRUpload">GCash Payment QR Code</label>
              <div class="qr-upload-container">
                <div id="qrPreview" class="qr-preview" style="display: none;">
                  <img id="qrImage" alt="GCash QR Code" />
                  <button type="button" class="btn-remove-qr" id="removeQRBtn" title="Remove QR">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="18" y1="6" x2="6" y2="18"></line>
                      <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                  </button>
                </div>
                <label for="gcashQRUpload" class="qr-upload-label" id="qrUploadLabel">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                  <span>Click to upload QR or drag & drop</span>
                </label>
                <input type="file" id="gcashQRUpload" accept="image/*" style="display: none;">
              </div>
              
              <label for="gcashReference">Reference Number</label>
              <input type="text" id="gcashReference" placeholder="Enter GCash reference..." autocomplete="off">
              
              <label for="gcashCustomerNumber">Customer GCash Number</label>
              <input type="text" id="gcashCustomerNumber" placeholder="09XX XXX XXXX" autocomplete="off">
              
              <label for="gcashCustomerName">Customer Name</label>
              <input type="text" id="gcashCustomerName" placeholder="Name on receipt" autocomplete="off">
            </div>
          </div>

          <!-- CONFIRMATION SECTION -->
          <div class="confirmation-section">
            <h3>Confirm Payment</h3>
            <p id="confirmationMessage" class="confirmation-message"></p>
            
            <div class="confirmation-buttons">
              <button id="confirmPaymentBtn" class="btn btn-primary full" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Complete Payment
              </button>
              <button id="cancelBtn" class="btn btn-ghost full" type="button">Cancel</button>
            </div>
          </div>

          <!-- LOADING INDICATOR -->
          <div id="loadingIndicator" class="loading-indicator" style="display: none;">
            <div class="spinner"></div>
            <p>Processing payment...</p>
          </div>

          <!-- SUCCESS MESSAGE -->
          <div id="successMessage" class="success-message" style="display: none;">
            <div class="success-content">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              <h3>Payment Successful!</h3>
              <p id="transactionId"></p>
              <button id="newSaleBtn" class="btn btn-primary full" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 5v14"></path>
                  <path d="M5 12h14"></path>
                </svg>
                New Sale
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

</body>

</html>
