<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroPOS Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-card">
    <img class="login-logo" src="/images/Icon.png" alt="MicroPOS Logo">
    <h1 class="login-title">MicroPOS</h1>

    <form id="loginForm" class="login-form">
        <div class="field-group">
            <label class="field-label" for="email">Email</label>
            <input type="email" id="email" class="input-field" placeholder="your@email.com" required>
        </div>

        <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>

        <a href="#" class="forgot-link">Forgot your password?</a>

        <button type="submit" class="btn-signin">Sign In</button>

        <div class="or-divider">
            <div class="or-line"></div>
            <span class="or-text">or</span>
            <div class="or-line"></div>
        </div>

        <a href="/signup" class="btn-create-account">Create account</a>
    </form>

    <p class="debt-link"><a href="/debts">Debt Tracker</a></p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });

        if (response.ok) {
            const data = await response.json();
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = data.redirect;
        } else {
            alert('Invalid email or password');
        }
    } catch (error) {
        console.error('Login error:', error);
        alert('An error occurred. Please try again.');
    }
});
</script>

</body>
</html>
