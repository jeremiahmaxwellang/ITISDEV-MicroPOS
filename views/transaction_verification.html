<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Transaction Verification | MicroPOS</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="/css/sidebar.css">
	<link rel="stylesheet" href="/css/transaction_verification.css">

	<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
	<script defer src="/js/sidebar.js"></script>
	<script defer src="/js/transaction_verification.js"></script>
</head>

<body class="with-sidebar">
	<aside class="sidebar"></aside>

	<div class="main-wrapper">
		<header class="main-header">
			<div class="main-header-left">
				<div>
					<div class="main-header-title">Transaction Verification</div>
					<div class="main-header-subtitle">Manage and verify payments</div>
				</div>
			</div>
			<div class="main-header-right">
				<div class="navbar-user">
					<div class="user-avatar" id="headerUserAvatar">--</div>
					<div>
						<div id="headerUserName" class="header-user-name">Staff User</div>
						<div id="headerUserRole" class="header-user-role">Employee</div>
					</div>
				</div>
			</div>
		</header>

		<div class="main-content">
			<section class="tv-shell">
				<div class="tv-toolbar card-base">
					<div>
						<h2 class="tv-title">Payment Proof</h2>
						<p class="tv-subtitle">Store customer proof screenshots and review payment details quickly.</p>
					</div>
					<button class="tv-btn tv-btn-primary" id="openModalBtn" type="button">
						<i data-lucide="plus"></i>
						Add Payment Proof
					</button>
				</div>

				<div id="paymentsList" class="proofs-grid">
					<div class="empty-state card-base">
						<i data-lucide="shield-check"></i>
						<h3>No Payment Proofs Yet</h3>
						<p>Click Add Payment Proof to upload the first transaction screenshot.</p>
					</div>
				</div>
			</section>
		</div>
	</div>

	<div id="addModal" class="modal-overlay" aria-hidden="true">
		<div class="modal-container card-base" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
			<div class="modal-header">
				<h3 id="addModalTitle">Add GCash Payment Proof</h3>
				<button class="icon-btn" id="closeModalBtn" type="button" aria-label="Close add payment proof modal">
					<i data-lucide="x"></i>
				</button>
			</div>

			<div class="modal-body">
				<div class="form-row">
					<div class="form-group">
						<label for="custName">Customer Name</label>
						<input id="custName" type="text" placeholder="Enter customer name" autocomplete="off">
					</div>
					<div class="form-group">
						<label for="gcashNum">GCash Number</label>
						<input id="gcashNum" type="text" placeholder="09XXXXXXXXX" autocomplete="off">
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label for="amountPaid">Amount Paid</label>
						<input id="amountPaid" type="number" min="0" step="0.01" placeholder="0.00">
					</div>
					<div class="form-group">
						<label for="datePaid">Date Paid</label>
						<input id="datePaid" type="date">
					</div>
				</div>

				<div class="form-group">
					<label for="proofImage">GCash Screenshot Proof</label>
					<input id="proofImage" type="file" accept="image/*">
				</div>

				<div class="image-preview-area" id="imagePreviewContainer">
					<div class="preview-placeholder">
						<i data-lucide="image"></i>
						<span>No image selected</span>
					</div>
				</div>

				<div class="modal-actions">
					<button class="tv-btn tv-btn-ghost" id="cancelAddBtn" type="button">Cancel</button>
					<button class="tv-btn tv-btn-primary" id="confirmAddBtn" type="button">
						<i data-lucide="save"></i>
						Save Payment Proof
					</button>
				</div>
			</div>
		</div>
	</div>

	<div id="detailPopup" class="detail-popup-overlay" aria-hidden="true">
		<div class="detail-card card-base" id="detailCardContent" role="dialog" aria-modal="true" aria-labelledby="detailTitle"></div>
	</div>
</body>

</html>
