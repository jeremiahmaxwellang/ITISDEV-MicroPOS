<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MicroPOS Signup</title>
	<link rel="stylesheet" href="/css/signup.css">
</head>
<body>

<div class="signup-card">
	<img class="signup-logo" src="/images/Icon.png" alt="MicroPOS Logo">
	<h1 class="signup-title">Create MicroPOS Account</h1>

	<form id="signupForm" class="signup-form">
		<div class="field-row">
			<div class="field-group">
				<label class="field-label" for="first_name">First Name</label>
				<input type="text" id="first_name" class="input-field" placeholder="Juan">
			</div>
			<div class="field-group">
				<label class="field-label" for="last_name">Last Name</label>
				<input type="text" id="last_name" class="input-field" placeholder="Dela Cruz">
			</div>
		</div>

		<div class="field-group">
			<label class="field-label" for="email">Email</label>
			<input type="email" id="email" class="input-field" placeholder="your@email.com" required>
		</div>

		<div class="field-row">
			<div class="field-group">
				<label class="field-label" for="password">Password</label>
				<input type="password" id="password" class="input-field" placeholder="At least 6 characters" minlength="6" required>
			</div>
			<div class="field-group">
				<label class="field-label" for="confirm_password">Confirm Password</label>
				<input type="password" id="confirm_password" class="input-field" placeholder="Repeat your password" minlength="6" required>
			</div>
		</div>

		<div class="field-row">
			<div class="field-group">
				<label class="field-label" for="role">Role</label>
				<select id="role" class="input-field" required>
					<option value="Employee" selected>Employee</option>
					<option value="Store Owner">Store Owner</option>
				</select>
			</div>
			<div class="field-group">
				<label class="field-label" for="phone_number">Phone Number</label>
				<input type="text" id="phone_number" class="input-field" placeholder="09XXXXXXXXX">
			</div>
		</div>

		<p id="formMessage" class="form-message" aria-live="polite"></p>

		<button type="submit" class="btn-signup">Create Account</button>
		<a href="/" class="btn-back-login">Back to Login</a>
	</form>
</div>

<script>
function clearStoredUser() {
	localStorage.removeItem('user');
	sessionStorage.removeItem('user');
}

document.getElementById('signupForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	const messageEl = document.getElementById('formMessage');
	messageEl.textContent = '';

	const password = document.getElementById('password').value;
	const confirmPassword = document.getElementById('confirm_password').value;

	if (password !== confirmPassword) {
		clearStoredUser();
		messageEl.textContent = 'Passwords do not match.';
		messageEl.classList.add('error');
		return;
	}

	try {
		const response = await fetch('/signup', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({
				first_name: document.getElementById('first_name').value,
				last_name: document.getElementById('last_name').value,
				email: document.getElementById('email').value,
				password,
				role: document.getElementById('role').value,
				phone_number: document.getElementById('phone_number').value
			})
		});

		const data = await response.json();

		if (!response.ok) {
			clearStoredUser();
			messageEl.textContent = data.message || 'Signup failed. Please try again.';
			messageEl.classList.add('error');
			return;
		}

		localStorage.setItem('user', JSON.stringify(data.user));
		window.location.href = data.redirect || '/pos';
	} catch (error) {
		clearStoredUser();
		console.error('Signup error:', error);
		messageEl.textContent = 'An error occurred. Please try again.';
		messageEl.classList.add('error');
	}
});
</script>

</body>
</html>
