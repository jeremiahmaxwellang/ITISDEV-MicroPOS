<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | MicroPOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/reports.css">
  <script defer src="/js/reports.js"></script>
</head>

<body>

  <!-- SIDEBAR -->
   
  <nav class="sidebar">

    <div class="nav-icon active" title="Dashboard">
      <img class="nav-icon-img" src="/images/Icon.png" alt="" aria-hidden="true">
    </div>
    <div class="nav-icon" title="Cart">
      <img class="nav-icon-img" src="/images/Icon2.png" alt="" aria-hidden="true">
    </div>
    <div class="nav-icon" title="Products">
      <img class="nav-icon-img" src="/images/Icon3.png" alt="" aria-hidden="true">
    </div>
    <a class="nav-icon" title="Reports" href="/reports" aria-label="Reports">
      <img class="nav-icon-img" src="/images/Icon4.png" alt="" aria-hidden="true">
    </a>
    <div class="nav-icon" title="Analytics">
      <img class="nav-icon-img" src="/images/Icon5.png" alt="" aria-hidden="true">
    </div>
    <div class="nav-icon" title="Settings">
      <img class="nav-icon-img" src="/images/Icon6.png" alt="" aria-hidden="true">
    </div>

    <div class="sidebar-bottom">
      <div class="nav-icon logout" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </div>
    </div>
  </nav>

  <main class="main">
    <header class="topbar">
      <div>
        <h1>Reports</h1>
        <p>Manage your store efficiently</p>
      </div>

      <div class="user-pill">
        <div class="user-info">
          <strong>Juan Dela Cruz</strong>
          <span>Store Owner</span>
        </div>
        <div class="user-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>
    </header>

    <section class="content">
      <div class="section-head">
        <h2>Summary of Reports</h2>
        <div class="head-actions">
          <label class="report-filter" for="periodSelect">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
            <select id="periodSelect">
              <option value="7">Last 7 Days</option>
              <option value="30">Last 30 Days</option>
              <option value="90">Last 90 Days</option>
            </select>
          </label>

          <button class="btn btn-z" id="zReadingBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              <line x1="8" y1="8" x2="16" y2="8"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
              <line x1="8" y1="16" x2="12" y2="16"></line>
            </svg>
            Z-Reading (End of Day)
          </button>

          <button class="btn btn-download" id="downloadBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download Report
          </button>
        </div>
      </div>

      <div class="metric-grid" id="metricsGrid"></div>

      <div class="segment-tabs">
        <button class="segment active" data-tab="products">Top Products</button>
        <button class="segment" data-tab="categories">Categories</button>
      </div>

      <div class="reports-grid">
        <article class="card product-highlight" id="highlightCard"></article>

        <article class="card top-list-card">
          <h3 id="listTitle">Top Selling Products</h3>
          <ul class="top-list" id="topList"></ul>
        </article>
      </div>
    </section>
  </main>
</body>

</html>
