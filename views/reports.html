<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - MicroPOS</title>

  <!-- Outfit Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/modern.css">
  <link rel="stylesheet" href="/css/sidebar.css">

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>

  <script defer src="/js/reports.js"></script>
</head>

<body class="with-sidebar">
  <!-- SIDEBAR NAVIGATION -->
  <aside class="sidebar">
    <div class="sidebar-logo">M</div>
    
    <div class="sidebar-nav">
      <a href="/pos" class="sidebar-nav-icon" title="Point of Sale">
        <i data-lucide="shopping-cart"></i>
      </a>
      <a href="/products" class="sidebar-nav-icon" title="Products">
        <i data-lucide="package"></i>
      </a>
      <a href="/debts" class="sidebar-nav-icon" title="Debts">
        <i data-lucide="alert-circle"></i>
      </a>
      <div class="sidebar-nav-icon active" title="Reports">
        <i data-lucide="bar-chart-2"></i>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="sidebar-nav-icon" title="Settings">
        <i data-lucide="settings"></i>
      </div>
      <div class="sidebar-logout" title="Logout">
        <i data-lucide="log-out"></i>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-wrapper">
    <!-- HEADER -->
    <header class="main-header">
      <div class="main-header-left">
        <div>
          <div class="main-header-title">Reports</div>
          <div class="main-header-subtitle">Track sales and business metrics</div>
        </div>
      </div>
      <div class="main-header-right">
        <div class="navbar-user">
          <div class="user-avatar">JD</div>
          <div>
            <div style="font-weight: 600;">Juan Dela Cruz</div>
            <div style="font-size: 0.75rem; color: #718096;">Store Owner</div>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <div class="main-content">
    <div style="margin-bottom: 2rem;">
      <h1 style="font-size: 2.5rem; font-weight: 700; color: #1a2035; margin-bottom: 0.5rem;">Reports & Analytics</h1>
      <p style="font-size: 1rem; color: #718096;">Track sales and business metrics</p>
    </div>

    <!-- FILTERS -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
      <button class="btn btn-secondary active" data-period="7">
        <i data-lucide="calendar" style="width: 18px; height: 18px;"></i>
        Last 7 Days
      </button>
      <button class="btn btn-secondary" data-period="30">
        <i data-lucide="calendar" style="width: 18px; height: 18px;"></i>
        Last 30 Days
      </button>
      <button class="btn btn-secondary" data-period="90">
        <i data-lucide="calendar" style="width: 18px; height: 18px;"></i>
        Last 90 Days
      </button>
    </div>

    <!-- METRICS GRID -->
    <div id="metricsContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
      <!-- Metrics will be loaded here -->
      <div class="card">
        <div class="card-body" style="text-align: center; padding: 2rem;">
          <i data-lucide="loader" style="width: 48px; height: 48px; margin: 0 auto 1rem; opacity: 0.5; color: #718096;"></i>
          <p style="color: #718096;">Loading metrics...</p>
        </div>
      </div>
    </div>

    <!-- DETAILED REPORTS -->
    <div style="margin-top: 3rem;">
      <h2 style="font-size: 1.5rem; font-weight: 600; color: #1a2035; margin-bottom: 1rem;">Export Reports</h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
        <button id="exportCSVBtn" class="btn btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <i data-lucide="download" style="width: 18px; height: 18px;"></i>
          Export CSV
        </button>
        <button id="exportPDFBtn" class="btn btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <i data-lucide="file-pdf" style="width: 18px; height: 18px;"></i>
          Export PDF
        </button>
        <button id="printBtn" class="btn btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <i data-lucide="printer" style="width: 18px; height: 18px;"></i>
          Print
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="messageToast" style="position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; background: white; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none; z-index: 2000; max-width: 300px;">
    <div id="toastMessage"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let currentPeriod = 7;

      // Period button handling
      const periodButtons = document.querySelectorAll('[data-period]');
      periodButtons.forEach(button => {
        button.addEventListener('click', () => {
          periodButtons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          currentPeriod = parseInt(button.dataset.period);
          loadMetrics();
        });
      });

      // Export buttons
      document.getElementById('exportCSVBtn').addEventListener('click', () => {
        alert('CSV export will be implemented. Using backend functionality at /reports/metrics');
      });

      document.getElementById('exportPDFBtn').addEventListener('click', () => {
        alert('PDF export will be implemented. Using backend functionality at /reports/metrics');
      });

      document.getElementById('printBtn').addEventListener('click', () => {
        window.print();
      });

      function loadMetrics() {
        // For now, show placeholder metrics
        const container = document.getElementById('metricsContainer');
        container.innerHTML = `
          <div class="card">
            <div class="card-body">
              <div style="color: #718096; font-size: 0.875rem; font-weight: 500;">Total Sales</div>
              <div style="font-size: 2rem; font-weight: 700; color: #3b5bdb;">₱ 15,450</div>
              <div style="color: #48bb78; font-size: 0.875rem; margin-top: 0.5rem;">↑ 12% from last period</div>
            </div>
          </div>
          <div class="card">
            <div class="card-body">
              <div style="color: #718096; font-size: 0.875rem; font-weight: 500;">Transactions</div>
              <div style="font-size: 2rem; font-weight: 700; color: #3b5bdb;">245</div>
              <div style="color: #48bb78; font-size: 0.875rem; margin-top: 0.5rem;">↑ 8% from last period</div>
            </div>
          </div>
          <div class="card">
            <div class="card-body">
              <div style="color: #718096; font-size: 0.875rem; font-weight: 500;">Avg Transaction</div>
              <div style="font-size: 2rem; font-weight: 700; color: #3b5bdb;">₱ 63.06</div>
              <div style="color: #ed8936; font-size: 0.875rem; margin-top: 0.5rem;">→ No change</div>
            </div>
          </div>
          <div class="card">
            <div class="card-body">
              <div style="color: #718096; font-size: 0.875rem; font-weight: 500;">Outstanding Debts</div>
              <div style="font-size: 2rem; font-weight: 700; color: #e53e3e;">₱ 4,230</div>
              <div style="color: #e53e3e; font-size: 0.875rem; margin-top: 0.5rem;">⬆ Alert</div>
            </div>
          </div>
        `;
      }

      // Initialize
      loadMetrics();
      lucide.createIcons();
    });
  </script>
</body>

</html>
