<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | MicroPOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
  :root {
    --font-main: 'Outfit', sans-serif;
    --font-head: 'Outfit', sans-serif;
    --radius-xl: 20px;
  }
  body, .main-header-title, .main-header-subtitle,
  .section-head h2, .segment, .btn, .report-filter select,
  .metric-text, .highlight-title, .highlight-name,
  .highlight-meta, .top-list-card h3, .top-info,
  .top-amount, .pie-legend-item {
    font-family: 'Outfit', sans-serif;
  }
  /* Depth & rounded corners */
  .card {
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(30, 36, 66, 0.08), 0 1px 4px rgba(30, 36, 66, 0.05);
    border: 1px solid #eaedf5;
  }
  .metric-card {
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(30, 36, 66, 0.09), 0 1px 3px rgba(30, 36, 66, 0.06);
  }
  .segment-tabs {
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(30, 36, 66, 0.08);
  }
  .segment.active {
    border-radius: 10px;
  }
  .report-filter {
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(30, 36, 66, 0.07);
  }
  .top-item {
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(30, 36, 66, 0.06);
  }
  .highlight-frame {
    border-radius: 20px;
  }
  .main-content {
    background: #f4f6fb;
  }
  /* Match products page avatar style */
  .navbar-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .navbar-user .user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f46e5, #818cf8);
    color: white;
    font-weight: 600;
    font-size: 0.875rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
  <link rel="stylesheet" href="/css/reports.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script defer src="/js/sidebar.js"></script>
  <script defer src="/js/reports.js"></script>
</head>

<body class="with-sidebar">

  <!-- SIDEBAR — populated by sidebar.js -->
  <aside class="sidebar"></aside>

  <!-- MAIN CONTENT -->
  <div class="main-wrapper">

    <!-- HEADER -->
    <header class="main-header">
      <div class="main-header-left">
        <div>
          <div class="main-header-title">Reports</div>
          <div class="main-header-subtitle">Manage your store efficiently</div>
        </div>
      </div>
      <div class="main-header-right">
        <div class="navbar-user">
          <div class="user-avatar">JD</div>
          <div>
            <div style="font-weight:600;">Juan Dela Cruz</div>
            <div style="font-size:0.75rem;color:#718096;">Store Owner</div>
          </div>
        </div>
      </div>
    </header>

    <!-- SCROLLABLE CONTENT -->
    <div class="main-content">
      <section class="content">

        <div class="section-head">
          <h2>Summary of Reports</h2>
          <div class="head-actions">
            <label class="report-filter" for="periodSelect">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
              </svg>
              <select id="periodSelect">
                <option value="7">Last 7 Days</option>
                <option value="30">Last 30 Days</option>
                <option value="90">Last 90 Days</option>
              </select>
            </label>

            <button class="btn btn-z" id="zReadingBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                <line x1="8" y1="8" x2="16" y2="8"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
                <line x1="8" y1="16" x2="12" y2="16"></line>
              </svg>
              Z-Reading (End of Day)
            </button>

            <button class="btn btn-download" id="downloadBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Download Report
            </button>
          </div>
        </div>

        <div class="metric-grid" id="metricsGrid"></div>

        <div class="segment-tabs">
          <button class="segment active" data-tab="products">Top Products</button>
          <button class="segment" data-tab="categories">Categories</button>
        </div>

        <div class="reports-grid">
          <article class="card product-highlight" id="highlightCard"></article>

          <article class="card top-list-card">
            <h3 id="listTitle">Top Selling Products</h3>
            <ul class="top-list" id="topList"></ul>
          </article>
        </div>

      </section>
    </div>

  </div>

</body>

</html>
