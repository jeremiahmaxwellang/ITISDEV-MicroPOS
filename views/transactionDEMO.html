<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GCash Payment Proofs | Transaction Verifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e6ecf2 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* Main container */
        .module-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header + add button row */
        .header-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .title h1 {
            font-size: 1.85rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E2A3A, #0F2B3D);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .title p {
            color: #2c3e4e;
            font-size: 0.9rem;
            margin-top: 0.25rem;
            font-weight: 500;
        }

        .btn-add {
            background: #00b4aa;
            background: linear-gradient(105deg, #008f7a, #00b4aa);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 48px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0, 140, 120, 0.3);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #007a66, #009f92);
            box-shadow: 0 12px 22px rgba(0, 120, 100, 0.35);
        }

        /* Grid of payment cards */
        .proofs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        /* Payment card (list item) */
        .payment-card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .payment-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.1);
            border-color: #00b4aa30;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .customer-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1e2f3c;
            letter-spacing: -0.2px;
        }

        .amount-paid {
            font-size: 1.3rem;
            font-weight: 800;
            color: #008f6b;
            background: #e0f2ef;
            display: inline-block;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            width: fit-content;
        }

        .card-badge {
            font-size: 0.7rem;
            background: #f0f2f5;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            color: #2c5a6e;
        }

        /* Empty state */
        .empty-state {
            background: rgba(255,255,240,0.6);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            color: #5c6f87;
            font-weight: 500;
            backdrop-filter: blur(4px);
            border: 1px dashed #b9cfdb;
        }

        /* MODAL overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            border-radius: 36px;
            overflow-y: auto;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.3);
            animation: fadeSlideUp 0.25s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 1.4rem 1.8rem;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #00665a, #00a38c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #8e9eae;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-modal:hover {
            color: #1e2f3c;
        }

        .modal-body {
            padding: 1.6rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: #1e3a47;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .form-group input {
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #fefefe;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00b4aa;
            box-shadow: 0 0 0 3px rgba(0,180,170,0.2);
        }

        .image-preview-area {
            margin-top: 6px;
            background: #f8fafc;
            border-radius: 24px;
            padding: 0.8rem;
            text-align: center;
            border: 1px dashed #bdd3e0;
        }

        .preview-img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 18px;
            object-fit: contain;
            background: #f2f6f9;
        }

        .btn-confirm {
            background: #00665a;
            padding: 0.9rem;
            border: none;
            border-radius: 44px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            margin-top: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-confirm:hover {
            background: #008572;
            transform: scale(0.98);
        }

        /* DETAIL POPUP (full details) */
        .detail-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .detail-popup-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .detail-card {
            background: white;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 44px;
            padding: 1.8rem;
            animation: fadeSlideUp 0.2s ease;
        }

        .detail-card h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #1e2f3c;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eef2f8;
            padding: 0.8rem 0;
            font-weight: 500;
        }

        .detail-label {
            color: #4b6b7c;
        }

        .detail-value {
            font-weight: 700;
            color: #1c3e4c;
            text-align: right;
            word-break: break-word;
        }

        .proof-image-container {
            margin: 1rem 0;
            text-align: center;
            background: #f4f9fe;
            border-radius: 28px;
            padding: 1rem;
        }

        .proof-image-container img {
            max-width: 100%;
            max-height: 320px;
            border-radius: 24px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .close-detail-btn {
            background: #eef2f6;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 1.2rem;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-detail-btn:hover {
            background: #dce5ec;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6f8ea0;
        }
    </style>
</head>
<body>

<div class="module-container">
    <div class="header-section">
        <div class="title">
            <h1>📸 GCash Payment Proofs</h1>
            <p>Transaction verification | Store & review payment records</p>
        </div>
        <button class="btn-add" id="openModalBtn">➕ Add Payment Proof</button>
    </div>

    <!-- List container: payment cards appear here -->
    <div id="paymentsList" class="proofs-grid">
        <!-- dynamic cards will be injected -->
        <div class="empty-state">✨ No payment proofs yet. Click "Add Payment Proof" to upload GCash receipts.</div>
    </div>
    <footer>✔️ Click any card to see full details + image proof | Secure storage (demo)</footer>
</div>

<!-- MODAL for adding new payment proof -->
<div id="addModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2>➕ New GCash Payment</h2>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>👤 Customer Full Name</label>
                <input type="text" id="custName" placeholder="e.g., Maria Santos" autocomplete="off">
            </div>
            <div class="form-group">
                <label>📞 GCash Number</label>
                <input type="text" id="gcashNum" placeholder="09XX XXX XXXX" autocomplete="off">
            </div>
            <div class="form-group">
                <label>💰 Amount Paid (₱)</label>
                <input type="number" id="amountPaid" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label>📅 Date Paid</label>
                <input type="date" id="datePaid">
            </div>
            <div class="form-group">
                <label>🖼️ Payment Proof (Image upload)</label>
                <input type="file" id="proofImage" accept="image/jpeg, image/png, image/jpg, image/webp">
                <div class="image-preview-area" id="imagePreviewContainer">
                    <span style="font-size:0.75rem; color:#6c8b9b;">No file selected</span>
                </div>
            </div>
            <button class="btn-confirm" id="confirmAddBtn">✅ Confirm & Add Proof</button>
        </div>
    </div>
</div>

<!-- DETAIL POPUP (for showing all details including full image) -->
<div id="detailPopup" class="detail-popup-overlay">
    <div class="detail-card" id="detailCardContent">
        <!-- dynamic content -->
    </div>
</div>

<script>
    // ---------- Data Storage ----------
    let paymentsArray = [];   // each object: { id, customerName, gcashNumber, amount, date, imageDataURL }

    // Helper to load from localStorage (optional persistence)
    function loadFromStorage() {
        const stored = localStorage.getItem("gcash_payments");
        if(stored) {
            try {
                paymentsArray = JSON.parse(stored);
                renderPaymentList();
            } catch(e) {}
        } else {
            // default demo sample data to showcase UI (but not cluttered - just empty)
            // optionally seed 1 example? but keep clean: no seed to respect fresh state
            // but to show how it works, we leave empty. However we add one sample for better visualization? 
            // To demonstrate "click to see details" we can add one dummy only if empty, but not mandatory.
            if(paymentsArray.length === 0) {
                // No demo data, but user will add. Keep empty.
            }
        }
    }

    function saveToStorage() {
        localStorage.setItem("gcash_payments", JSON.stringify(paymentsArray));
    }

    // render the list of payment proofs (just customer name + amount)
    function renderPaymentList() {
        const container = document.getElementById("paymentsList");
        if(!container) return;
        if(paymentsArray.length === 0) {
            container.innerHTML = `<div class="empty-state">📭 No payment proofs yet. Click "Add Payment Proof" to upload GCash receipts.</div>`;
            return;
        }
        let html = "";
        for(let i = 0; i < paymentsArray.length; i++) {
            const p = paymentsArray[i];
            const formattedAmount = "₱" + parseFloat(p.amount).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            html += `
                <div class="payment-card" data-id="${p.id}">
                    <div class="card-info">
                        <span class="customer-name">${escapeHtml(p.customerName) || "Unnamed"}</span>
                        <span class="amount-paid">${formattedAmount}</span>
                        <span class="card-badge">📱 GCash</span>
                    </div>
                    <div style="font-size:1.8rem; opacity:0.6;">👁️</div>
                </div>
            `;
        }
        container.innerHTML = html;

        // attach click listeners to each card to open detail popup
        document.querySelectorAll('.payment-card').forEach(card => {
            card.addEventListener('click', (e) => {
                // stop if clicking on inner elements but it's fine
                const id = parseInt(card.getAttribute('data-id'));
                const payment = paymentsArray.find(p => p.id === id);
                if(payment) {
                    openDetailPopup(payment);
                }
            });
        });
    }

    // helper to escape HTML to avoid injection
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // open detailed popup with all info + image
    function openDetailPopup(payment) {
        const popup = document.getElementById("detailPopup");
        const detailContainer = document.getElementById("detailCardContent");
        if(!popup || !detailContainer) return;

        const formattedAmount = "₱" + parseFloat(payment.amount).toLocaleString(undefined, {minimumFractionDigits: 2});
        const dateString = payment.date ? payment.date : "Not specified";
        const gcashNum = payment.gcashNumber || "—";
        const imageHtml = payment.imageDataURL && payment.imageDataURL.startsWith("data:image") 
            ? `<img src="${payment.imageDataURL}" alt="GCash proof screenshot" style="max-width:100%; border-radius:24px; box-shadow:0 6px 14px rgba(0,0,0,0.1);">` 
            : `<div style="background:#f1f5f9; padding:2rem; border-radius:24px; text-align:center">⚠️ No image uploaded</div>`;

        detailContainer.innerHTML = `
            <h3>🧾 Payment Details</h3>
            <div class="detail-row">
                <span class="detail-label">Customer Name</span>
                <span class="detail-value">${escapeHtml(payment.customerName) || "—"}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">GCash Number</span>
                <span class="detail-value">${escapeHtml(gcashNum)}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Amount Paid</span>
                <span class="detail-value">${formattedAmount}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date Paid</span>
                <span class="detail-value">${escapeHtml(dateString)}</span>
            </div>
            <div class="proof-image-container">
                <div style="font-weight:600; margin-bottom:12px;">📸 Payment Proof</div>
                ${imageHtml}
            </div>
            <button class="close-detail-btn" id="closeDetailBtn">Close</button>
        `;
        
        popup.classList.add("active");
        const closeBtn = document.getElementById("closeDetailBtn");
        if(closeBtn) {
            closeBtn.addEventListener("click", () => {
                popup.classList.remove("active");
            });
        }
        // click overlay to close too
        popup.addEventListener("click", function overlayClickHandler(e) {
            if(e.target === popup) {
                popup.classList.remove("active");
                popup.removeEventListener("click", overlayClickHandler);
            }
        });
    }

    // ----- MODAL logic and image preview -----
    const modal = document.getElementById("addModal");
    const openModalBtn = document.getElementById("openModalBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const confirmBtn = document.getElementById("confirmAddBtn");

    // inputs
    const custNameInput = document.getElementById("custName");
    const gcashNumInput = document.getElementById("gcashNum");
    const amountInput = document.getElementById("amountPaid");
    const dateInput = document.getElementById("datePaid");
    const imageFileInput = document.getElementById("proofImage");
    const previewContainer = document.getElementById("imagePreviewContainer");

    let currentImageDataURL = null;  // temp store during modal

    function resetModalForm() {
        custNameInput.value = "";
        gcashNumInput.value = "";
        amountInput.value = "";
        dateInput.value = "";
        imageFileInput.value = "";
        currentImageDataURL = null;
        if(previewContainer) {
            previewContainer.innerHTML = `<span style="font-size:0.75rem; color:#6c8b9b;">No file selected</span>`;
        }
    }

    // image preview handler
    imageFileInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if(!file) {
            currentImageDataURL = null;
            previewContainer.innerHTML = `<span style="font-size:0.75rem; color:#6c8b9b;">No file selected</span>`;
            return;
        }
        if(!file.type.match('image.*')) {
            alert("Please upload a valid image file (JPEG, PNG, etc)");
            imageFileInput.value = "";
            currentImageDataURL = null;
            previewContainer.innerHTML = `<span style="font-size:0.75rem; color:#c00;">Invalid file type</span>`;
            return;
        }
        const reader = new FileReader();
        reader.onload = function(ev) {
            currentImageDataURL = ev.target.result;
            previewContainer.innerHTML = `<img src="${currentImageDataURL}" class="preview-img" alt="preview" style="max-height:130px; border-radius:16px;">`;
        };
        reader.readAsDataURL(file);
    });

    function openModal() {
        resetModalForm();
        modal.classList.add("active");
    }

    function closeModal() {
        modal.classList.remove("active");
        resetModalForm();
    }

    function addNewPayment() {
        // validation
        const customerName = custNameInput.value.trim();
        if(!customerName) {
            alert("Please enter customer name");
            return;
        }
        const gcashNumber = gcashNumInput.value.trim();
        if(!gcashNumber) {
            alert("Please enter GCash number");
            return;
        }
        let amount = parseFloat(amountInput.value);
        if(isNaN(amount) || amount <= 0) {
            alert("Please enter a valid positive amount");
            return;
        }
        const datePaid = dateInput.value;
        if(!datePaid) {
            alert("Please select date paid");
            return;
        }
        if(!currentImageDataURL) {
            alert("Please upload a payment proof image (screenshot of GCash transaction)");
            return;
        }
        
        // create new payment entry
        const newId = Date.now();
        const newPayment = {
            id: newId,
            customerName: customerName,
            gcashNumber: gcashNumber,
            amount: amount,
            date: datePaid,
            imageDataURL: currentImageDataURL
        };
        paymentsArray.unshift(newPayment); // latest on top
        saveToStorage();
        renderPaymentList();
        closeModal();
    }

    openModalBtn.addEventListener("click", openModal);
    closeModalBtn.addEventListener("click", closeModal);
    confirmBtn.addEventListener("click", addNewPayment);
    
    // close modal when clicking overlay
    modal.addEventListener("click", function(e) {
        if(e.target === modal) {
            closeModal();
        }
    });

    // Initialize: load from storage and render
    loadFromStorage();
    
    // Optional: set default date to today in modal? Not necessary but helpful
    function setDefaultDate() {
        if(!dateInput.value) {
            const today = new Date().toISOString().slice(0,10);
            dateInput.value = today;
        }
    }
    // call on open modal after reset but easier to attach event when modal opens
    const originalOpenModal = openModal;
    window.openModal = openModal;
    openModal = function() {
        originalOpenModal();
        setTimeout(() => {
            if(!dateInput.value) {
                const today = new Date().toISOString().slice(0,10);
                dateInput.value = today;
            }
        }, 10);
    };
    openModalBtn.removeEventListener("click", originalOpenModal);
    openModalBtn.addEventListener("click", () => {
        resetModalForm();
        modal.classList.add("active");
        setTimeout(() => {
            if(!dateInput.value) {
                const today = new Date().toISOString().slice(0,10);
                dateInput.value = today;
            }
        }, 5);
    });
    
    // rewire modal close and confirm to new references
    // confirm button and close events already bound using global functions, but we also need to ensure reset uses same.
    // but confirm uses addNewPayment which uses currentImageDataURL & fields, works fine.
    
    // also if there are multiple listeners we safe keep.
    // remove any dup listeners by replacing but fine.
    // final touch: ensure that render works after deletion? not needed (no delete)
    // For demo we also add a small style to make date placeholder.
    
    // Overwrite any double open logic: ensure that image preview resets each time modal opens.
    // already resetModalForm called within open click.
    // final detail popup close handles.
    
    // make sure to sync any leftover manual change.
    console.log("Transaction Verification Module ready — GCash proofs with image & details");
</script>
</body>
</html>
