<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | MicroPOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/products.css">
  <script defer src="/js/products.js"></script>
</head>

<body>

  <!-- SIDEBAR -->
   
  <nav class="sidebar">

    <div class="nav-icon active" title="Dashboard">
      <img class="nav-icon-img" src="/images/Icon.png" alt="" aria-hidden="true">
    </div>
    <div class="nav-icon" title="Cart">
      <img class="nav-icon-img" src="/images/Icon2.png" alt="" aria-hidden="true">
    </div>
    <a class="nav-icon" title="Products" href="/products" aria-label="Products">
      <img class="nav-icon-img" src="/images/Icon3.png" alt="" aria-hidden="true">
    </a>
    <a class="nav-icon" title="Reports" href="/reports" aria-label="Reports">
      <img class="nav-icon-img" src="/images/Icon4.png" alt="" aria-hidden="true">
    </a>
    <div class="nav-icon" title="Analytics">
      <img class="nav-icon-img" src="/images/Icon5.png" alt="" aria-hidden="true">
    </div>
    <div class="nav-icon" title="Settings">
      <img class="nav-icon-img" src="/images/Icon6.png" alt="" aria-hidden="true">
    </div>

    <div class="sidebar-bottom">
      <div class="nav-icon logout" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </div>
    </div>
  </nav>

  <main class="main">
    <header class="topbar">
      <div>
        <h1>Products</h1>
        <p>Manage your store efficiently</p>
      </div>

      <div class="profile">
        <div class="profile-info">
          <strong>Juan Dela Cruz</strong>
          <span>Store Owner</span>
        </div>
        <div class="profile-avatar" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>
    </header>

    <section class="panel">
      <div class="segment-tabs" role="tablist" aria-label="Products sections">
        <button class="segment-tab active" type="button">Products</button>
        <button class="segment-tab" type="button">Product Insights</button>
        <button class="segment-tab" type="button">Reported Products</button>
      </div>

      <div class="toolbar">
        <label class="search" for="searchInput">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="searchInput" type="text" placeholder="Search products" autocomplete="off">
        </label>

        <label class="category-filter" for="categorySelect">
          <select id="categorySelect" aria-label="Filter by category">
            <option value="all">All Categories</option>
          </select>
        </label>

        <button class="btn btn-primary" id="addProductBtn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Product
        </button>

        <button class="btn btn-ghost" id="exportBtn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Export
        </button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Manufacturer</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsBody">
            <tr>
              <td colspan="6" class="loading">Loading products...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>

</html>
